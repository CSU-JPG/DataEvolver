# =============================================================================
# DataEvolver — Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  images_crawled: "/path/to/crawled/images"      # Raw downloaded images
  images_generated: "/path/to/generated/images"  # T2I generated images
  ann_dir: "/path/to/annotations"                # Failure case logs
  log_dir: "/path/to/logs"                       # Pipeline logs
  accepted_dir: "/path/to/accepted"              # Final accepted dataset
  gen_dir: "/path/to/generated/raw"              # Raw generated images
  gen_accepted_dir: "/path/to/gen/accepted/images"      # Post-filtered generated images

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset_num: 1000000

filenames:
  strategy: seq                       # "seq" | "uuid" | "hash"

split:
  train_ratio: 0.99

# ---------------------------------------------------------------------------
# Generation phase toggle
# ---------------------------------------------------------------------------
generation:
  enabled: true
  max_regeneration_rounds: 3        
  prompt_critic_enabled: true       

# ---------------------------------------------------------------------------
# LLM & Agents
# ---------------------------------------------------------------------------
llm:
  model: "mistral:latest"             # main LLM for Retriever / QueryGenerator / CountAnalyse / QueryPlannerAgent
  cir_model: "qwen3.5:4b"             # critic LLM for PromptPlanner / SemanticAdvantageAgent / ExperienceLibrarianAgent

critic:
  enabled: true
  strategy:
    enabled: true                     # enable LLM-based query optimization
    queries_enabled: true             # independently enable strategy query generation
    warmup_rounds: 3                  # use legacy queries for the first N rounds
    history_limit: 50                 # keep last N pass-rate / diagnostic points
  experience:
    use_agent: true                   # True → ExperienceLibrarianAgent; False → hardcoded maintainer
    semantic_window: 2                # sliding window of semantic advantages retained
    top_k: 10                         # max top-performing queries kept in experience library
    prompt_window: 2                  # history window size for Agent prompts
    fallback_mode: "hardcoded"        # "merge" | "keep" | "hardcoded"

rejection_vector:
  enabled: true
  round_size: 1000

# ---------------------------------------------------------------------------
# Pipeline concurrency & flow control
# ---------------------------------------------------------------------------
concurrency:
  enable_async: true
  dry_run: false
  query_workers: 64
  quality_workers: 46
  semantic_workers: 24
  batch_write_size: 50
  max_queue_sizes:
    queries: 500
    downloaded: 300
    ocr: 850
    quality: 800
    semantic: 1000
  rate_limits:
    query_qps: 5                      # throttle query requests when receiving HTTP 429

dynamic_query:
  enabled: true
  low_watermark: 30                   # refill queries queue when size drops below this
  monitor_batch_size: 3               # subtopics to process per monitoring batch
  monitor_queries_per_subtopic: 15    # max queries per subtopic per monitoring cycle
  max_wait_sec: 180                   # max seconds with no queue growth before fallback (0 = off)
  max_empty_cycles: 20                # max consecutive empty-growth cycles before fallback (0 = off)
  fallback_strategy: "warmup"         # "static" | "warmup"

feedback_query:
  enabled: true
  min_samples: 20                     # min samples before triggering feedback
  stagnation_samples: 10              # stagnation threshold (samples)
  acc_rate_low: 0.15                  # low acceptance rate threshold
  quality_reject_high: 0.50           # high quality rejection rate threshold
  semantic_reject_high: 0.40          # high semantic rejection rate threshold
  max_opt_per_query: 1                # max optimizations per query
  max_opt_per_subtopic: 5             # max optimized queries per subtopic
  initial_warmup_subtopics: 10        # subtopics preloaded during initial warmup
  max_llm_calls_per_loop: 10          # max critic subtopic additions per round

metrics:
  log_interval_sec: 30                # periodic snapshot interval (0 = off)
  print_every_batch: true             # print summary on each batch flush
  enable_queue_sizes: true            # include per-stage queue lengths in snapshot
  enable_memory: false                # include RSS / GPU memory in snapshot

# ---------------------------------------------------------------------------
# Search (Bing)
# ---------------------------------------------------------------------------
bing:
  per_subtopic_images: 1500          # max images to fetch per subtopic

  step: 57                           # images per Bing async page
  max_concurrent_pages: 3            # concurrent Bing page requests in flight
  max_empty_pages: 4                 # consecutive empty pages before stopping
  per_page_timeout: 12.0             # HTTP timeout (seconds) per page fetch
  retry_per_page: 3                  # max retries per page on transient errors
  max_warmup_retries: 2              # max session-level warmup retries

  mkt: "auto"                        # "auto" | "en-US" | "zh-CN" | "ja-JP" | "ko-KR" | ...
                                     # "auto" detects from query Unicode content
  safesearch: "moderate"             # "off" | "moderate" | "strict"

  download_concurrency_initial: 24   # starting download concurrency
  download_concurrency_min: 8        # floor for adaptive download concurrency
  download_concurrency_max: 48       # ceiling for adaptive download concurrency
  per_host_limit: 4                  # max concurrent downloads per host
  download_connect_timeout: 4.0      # socket connect timeout (seconds)
  download_read_timeout: 8.0         # socket read timeout (seconds)
  download_retry: 2                  # max retries per image download
  head_precheck: false               # pre-check URLs with HEAD before GET

# ---------------------------------------------------------------------------
# OCR
# ---------------------------------------------------------------------------
ocr:
  use_multi_gpu: true
  use_multiprocess: true
  max_instances: 8
  instances_per_gpu: 1
  max_workers: 8
  max_pending: 8000
  engine: "paddle"
  lang: "ch"
  use_angle_cls: true
  use_gpu: true
  show_log: false
  device_id: 0                        # single-GPU fallback device
  min_words: 4                        # minimum OCR word count for quality checks
  min_free_gb: 2.0                    # skip GPUs with less free VRAM

# ---------------------------------------------------------------------------
# Quality assessment
# ---------------------------------------------------------------------------
quality:
  min_ocr_coverage: 0.25
  min_legibility: 0.5
  min_sharpness: 50
  min_char_h_px: 10
  max_char_h_cv: 0.75
  max_line_angle_std: 60
  min_centrality: 0.15
  max_border_ratio: 0.30
  min_text_density: 23
  max_clutter: 0.18
  min_contrast: 0.07
  min_char_density: 3
  min_side: 384                       # minimum short-side pixels
  max_side: 4096                      # maximum long-side pixels
  min_ar: 0.35                        # minimum aspect ratio (width / height)
  max_ar: 3.0                         # maximum aspect ratio (width / height)
  allow_languages: ["en", "zh", "zh-cn", "zh-tw", "ja", "ko", "de", "fr", "es", "ru", "it"]
  lang_policy: "prefer"               # "prefer" | "require"

watermark:
  enabled: true

# ---------------------------------------------------------------------------
# Semantic relevance (CLIP)
# ---------------------------------------------------------------------------
semantic:
  enabled: true
  model_name: "openai/clip-vit-base-patch32"
  thresholds:
    min_similarity: 0.5
    min_topic_similarity: 0.55
    min_subtopic_similarity: 0.57
    min_combined_similarity: 0.55
    min_prompt_similarity: 0.55
  device: "cuda"
  verbose: true

# ---------------------------------------------------------------------------
# Text consistency (sentence-transformers)
# ---------------------------------------------------------------------------
text_consistency:
  enabled: true
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  top_k_ocr: 10
  min_topic_similarity: 0.2
  min_subtopic_similarity: 0.23
  min_combined_similarity: 0.2

# ---------------------------------------------------------------------------
# pHash-based cross-image deduplication
# ---------------------------------------------------------------------------
hash_deduplication:
  enabled: true
  max_distance: 3                     # Hamming distance threshold
  scope: "global"                     # "global" | "topic"
  verbose: false
  auto_flush: false
  index_path: "/path/to/accepted/hash_index.json"

# ---------------------------------------------------------------------------
# Qwen image generation (T2I)
# ---------------------------------------------------------------------------
qwen:
  true_cfg_scale: 4.5
  num_inference_steps: 25
  seed: 42

# ---------------------------------------------------------------------------
# Vision-language annotation (Qwen-VL)
# ---------------------------------------------------------------------------
annotation:
  qwen_vl:
    enabled: true
    model: "qwen3-vl:latest"
    verbose: false

